name: Deploy to Vercel

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          # Requires `VERCEL_TOKEN` secret in repository settings.
          # Optionally set VERCEL_ORG_ID and VERCEL_PROJECT_ID as secrets for explicit targeting.
          npx vercel --prod --token $VERCEL_TOKEN --confirm
